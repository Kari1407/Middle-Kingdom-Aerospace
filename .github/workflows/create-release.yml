name: create-release

on:
  workflow_dispatch:
    inputs:
      version-string:
        type: string
        required: true

jobs:
  internal-create-release:
    uses: KSPModdingLibs/KSPBuildTools/.github/workflows/create-release.yml@1.1.1
    with:
      use-msbuild: false
      version-string: ${{ inputs.version-string }}
      artifacts: GameData LICENSE* README* CHANGELOG* Extras
