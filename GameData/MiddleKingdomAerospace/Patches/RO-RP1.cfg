//	YF-100 Double CZ5
@PART[MKA_26_CZ5_YF100_MOUNT]:NEEDS[RealismOverhaul]:BEFORE[RealismOverhaul]
{
	@mass = 4.5
  	@maxTemp = 1200
 	%bodyLiftMultiplier = 0.1

	@MODULE[ModuleEngines*]
	{
		%EngineType = LiquidFuel
	}

	!MODULE[ModuleEngineConfigs],*{}
	!MODULE[ModuleAlternator],*{}
	!RESOURCE,*{}

 	MODULE
	{
		name = ModuleEngineConfigs
		type = ModuleEngines
		configuration = YF-100 Dual Mount
		origMass = 7.8
		modded = false
		CONFIG
		{
			name = YF-100 Dual Mount
			description = YF-100 for LM-5 Boosters
			minThrust = 1658.4
			maxThrust = 2678.96
			heatProduction = 100
			massMult = 1.0
			PROPELLANT
			{
				name = RP-1
				ratio = 0.3487
				DrawGauge = true
			}
			PROPELLANT
			{
				name = LqdOxygen
				ratio = 0.6513
			}
			atmosphereCurve
			{
				key = 0 335
				key = 1 300
			}

			%ullage = True
			%pressureFed = False
			%ignitions = 1	
			IGNITOR_RESOURCE
			{
				name = ElectricCharge
				amount = 2.0
			}
			IGNITOR_RESOURCE
			{
				name = TEATEB
				amount = 2.0
			}
		}
	}
	RESOURCE
	{
		name = TEATEB
		amount = 2.0
		maxAmount = 2.0
	}
	RESOURCE
	{
		name = ElectricCharge
		amount = 10000
		maxAmount = 10000
	}
}

