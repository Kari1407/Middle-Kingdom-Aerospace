		{
			name = PBAN
			ratio = 1.0
			DrawGauge = True
		}
		!atmosphereCurve {}
		atmosphereCurve
		{
			key = 0 260
			key = 1 200
		}		
  	}

	MODULE
    {
        name = ModuleFuelTanks
        type = Default
        volume = 138643.9
        basemass = -1
		TANK
		{
			name = RP-1
			amount = Full
			maxAmount = 34.87%
		}
		TANK
		{
			name = LqdOxygen
			amount = Full
			maxAmount = 65.13%
		}
    }
	RESOURCE
	{
		name = PBAN
		amount = 50
		maxAmount = 50
	}
}

