//	================================================================================
//	RP-1 Avionics
//	================================================================================

@PART[MKA_*]:HAS[@MODULE[ModuleCommand]]:NEEDS[RP-0]:AFTER[MiddleKingdomAerospace]
{

	!MODULE[ModuleAvionics] {}
	
	@MODULE[ModuleCommand]
	{
		!RESOURCE,* {}
		%hasHibernation = false
	}
	MODULE
	{
		name = ModuleAvionics
		massLimit = 10000.0
		interplanetary = True
		toggleable = true
		disabledkW = 0.1
		enabledkW = 1.3
	}

	MODULE:NEEDS[kOS]
	{
		name = kOSProcessor
		diskSpace = 50000
		diskSpaceCostFactor = 0.001		  // 50F for double space
		diskSpaceMassFactor = 0.00000005  // 2.5 kg for double space
		ECPerInstruction = 0.00000008	  // 8W @ 2000 IPU
	}
}
@PART[MKA_26_CZ5_PAYLOAD_ADAPTER]:NEEDS[RP-0]:AFTER[MiddleKingdomAerospace]
{
	@MODULE[ModuleAvionics]
	{
		@massLimit = 900
	}
}

