//  General Patch
@PART[MKA_*]:NEEDS[RealismOverhaul]:AFTER[MiddleKingdomAerospace]
{
    %RSSROConfig = True
    @manufacturer = #roMfrCALT
	%skinTempTag = Aluminum
	%internalTempTag = Aluminum
    
    !RESOURCE,* {}
	!MODULE[ModuleInventoryPart],* {}
	!MODULE[ModuleReactionWheel],* {}
	!MODULE[ModuleFuelTanks],* {}
	!MODULE[ModuleB9PartSwitch]:HAS[#moduleID[MKA_Fuel]]{}

	@MODULE[ModuleCommand]
	{
		%hasHibernation = True
		%hibernationMultiplier = 0.625
		RESOURCE
		{
			name = ElectricCharge
			rate = 1.3
		}
	}
}



