//------------------Real Scale miscellaneous patches------------------//

@PART[MKA_*]:NEEDS[SMURFF]
{
	%SMURFFExclude = true
}

@PART[MKA_*]:NEEDS[SolSystem]:BEFORE[MiddleKingdomAerospace]
{
    %SystemScale = #$@Sol_Configuration/SystemScale$
}

@PART[MKA_*]:NEEDS[RealSolarSystem,!SolSystem]:BEFORE[MiddleKingdomAerospace]
{
    %SystemScale = Real
}

@PART[MKA_*]:FINAL
{
	!SystemScale = delete
}

@PART[MKA_*]:HAS[#SystemScale[?eal]]:FOR[MiddleKingdomAerospace]
{
	%rescaleFactor = 1.6
	%maxTemp = 448
	%skinMaxTemp = 588
	@breakingForce = 250
	@breakingTorque = 250
	@crashTolerance = 20
}


