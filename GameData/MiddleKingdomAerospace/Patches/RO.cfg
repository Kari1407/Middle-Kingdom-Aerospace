//Note: tanks arnt filling right, remove all tanks and click the engine

// General stuffz

@PART[MKA_*]:NEEDS[RealismOverhaul]:AFTER[MiddleKingdomAerospace]
{
    %RSSROConfig = True
    @manufacturer = CALT
    @rescaleFactor = 1.6
}


///// Second Stage

// Tanks 

@PART[MKA_26_CZ5_H52]:NEEDS[RealismOverhaul]
{
    @mass = 4
    !MODULE[ModuleB9PartSwitch]:HAS[#moduleID[MKA_Fuel]] {}
    MODULE
	{
		name = ModuleFuelTanks
		volume =  127312.5
		type = Tank-Sep-Starship
		basemass = -1
		TANK
		{
			name = LqdHydrogen
			amount = Full
			maxAmount = 85.714285714%
		}
		TANK
		{
			name = LqdOxygen
			amount = Full
			maxAmount = 14.285714285%
		}
	}
    MODULE
	{
		name = ModuleFuelTanks
		volume =  750
		type = Tank-Sep-Starship
		basemass = -1
		TANK
		{
			name = HTP
			amount = Full
			maxAmount = 100%
		}
	}
    @MODULE[ModuleRCSFX]
    {
        @resourceName = HTP
    }
}

@PART[MKA_26_CZ5_PAYLOAD_ADAPTER]:NEEDS[RealismOverhaul]
{
    @mass = 0.57
}

// Engines

@PART[MKA_26_CZ5_YF75D]:NEEDS[RealismOverhaul]
{
    @mass = 0.265
    @MODULE[ModuleEnginesFX]
    {
        @minThrust = 88.36
        @maxThrust = 88.36
        @PROPELLANT[LqdHydrogen]
        {
            @ratio = 6
        }
        @PROPELLANT[Oxidizer]
        {
            @name = LqdOxygen
            @ratio = 1
        }
        @atmosphereCurve
		{
			@key,0 = 0 442.6
			@key,1 = 1 120
		}
    }
}

