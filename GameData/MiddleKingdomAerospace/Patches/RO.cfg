// Engines

@PART[MKA_26_CZ5_YF100_MOUNT]:NEEDS[RealismOverhaul]
{
    @mass = 3.84
    @MODULE[ModuleEnginesFX]
    {
        @minThrust = 1742
        @maxThrust = 2680
        @PROPELLANT[LiquidFuel]
        {
            @name = RP-1
            @ratio = 1
        }
        @PROPELLANT[Oxidizer]
        {
            @name = LqdOxygen
            @ratio = 2.6
        }
        @atmosphereCurve
		{
			@key,0 = 0 335
			@key,1 = 1 300
		}
    }
}

